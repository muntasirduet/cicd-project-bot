name: CI + Smart Hermes QA + Auto Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-qa:
    runs-on: ubuntu-latest
    outputs:
      qa_status: ${{ steps.qa.outputs.status }}

    steps:
      # --------------------------------
      # 1. Checkout (IMPORTANT for git diff)
      # --------------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # --------------------------------
      # 2. Setup .NET
      # --------------------------------
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # --------------------------------
      # 3. Restore
      # --------------------------------
      - name: Restore
        run: dotnet restore App/App.csproj

      # --------------------------------
      # 4. Build
      # --------------------------------
      - name: Build
        run: dotnet build App/App.csproj --no-restore

      # --------------------------------
      # 5. Collect Git Diff (SMART QA INPUT)
      # --------------------------------
      - name: Collect Git Diff Context
        run: |
          {
            echo "===== CHANGED FILES ====="
            git diff --name-only HEAD~1 HEAD
            echo ""
            echo "===== CODE DIFF ====="
            git diff HEAD~1 HEAD
          } > context.txt

      # --------------------------------
      # 6. Install jq (FIX JSON ISSUES)
      # --------------------------------
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # --------------------------------
      # 7. HERMES SMART QA (FIXED + SAFE)
      # --------------------------------
      - name: Hermes Smart QA
        id: qa
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          CONTEXT=$(cat context.txt | head -c 4000 | jq -Rs .)

          # Build payload safely with jq
          PAYLOAD=$(jq -n \
            --arg context "${CONTEXT}" \
            '{
              model: "google/gemini-2.0-flash-lite-preview-02-05",
              messages: [
                {
                  role: "system",
                  content: "You are Hermes QA agent. Analyze code diffs for build safety, risks, breaking changes, and security issues. Return ONLY valid JSON: {\"status\":\"PASS\" or \"FAIL\",\"reason\":\"concise explanation\"}"
                },
                {
                  role: "user",
                  content: "Analyze this git diff and return JSON only. Diff: \($context)"
                }
              ]
            }')

          echo "Sending request to OpenRouter..."
          RESPONSE=$(curl -s -w "\n%{http_code}" https://openrouter.ai/api/v1/chat/completions \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP Code: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ OpenRouter API failed with HTTP $HTTP_CODE"
            echo "status=FAIL" >> $GITHUB_OUTPUT
            exit 1
          fi

          # Extract message content
          CONTENT=$(echo "$BODY" | jq -r '.choices[0].message.content // empty')
          echo "QA Content: $CONTENT"

          if [ -z "$CONTENT" ]; then
            echo "❌ Empty response from QA agent"
            echo "status=FAIL" >> $GITHUB_OUTPUT
            exit 1
          fi

          # Parse JSON from content (handle markdown code blocks)
          CLEAN_CONTENT=$(echo "$CONTENT" | sed 's/```json//g; s/```//g' | tr -d '\n\r' | sed 's/^ *//;s/ *$//')

          QA_STATUS=$(echo "$CLEAN_CONTENT" | jq -r '.status // "FAIL"')
          QA_REASON=$(echo "$CLEAN_CONTENT" | jq -r '.reason // "Unknown error"')

          echo "status=$QA_STATUS" >> $GITHUB_OUTPUT
          echo "QA_STATUS=$QA_STATUS" >> $GITHUB_ENV
          echo "QA_REASON=$QA_REASON" >> $GITHUB_ENV

          echo "QA Result: $QA_STATUS"
          echo "QA Reason: $QA_REASON"

          if [ "$QA_STATUS" == "FAIL" ]; then
            echo "❌ QA FAILED"
            exit 1
          else
            echo "✅ QA PASSED"
          fi

  # ============================================
  # OPTION A: Deploy via SSH (for remote/VPS servers with public IP)
  # Requires secrets: SERVER_HOST, SERVER_USER, SERVER_SSH_KEY
  # ============================================
  deploy-ssh:
    needs: build-and-qa
    runs-on: ubuntu-latest
    if: success() && needs.build-and-qa.outputs.qa_status == 'PASS'

    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          timeout: 60s
          command_timeout: 10m
          script_stop: true
          script: |
            set -euo pipefail
            echo "🚀 Starting Deployment..."

            mkdir -p ~/my-cicd-project
            cd ~/my-cicd-project

            echo "Pulling latest code..."
            git fetch origin
            git reset --hard origin/main

            echo "Building project..."
            dotnet build App/App.csproj -c Release

            echo "===================="
            echo "DEPLOY SUCCESS 🚀"
            echo "===================="

  # ============================================
  # OPTION B: Deploy via Self-Hosted Runner (for local WSL/machine)
  # This runs the deploy step directly on your machine.
  # To use: comment out OPTION A above and uncomment this job,
  # then set up a self-hosted runner (see README).
