name: CI + Smart Hermes QA + Auto Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # --------------------------------
      # 1. Checkout
      # --------------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2   # IMPORTANT for git diff

      # --------------------------------
      # 2. Setup .NET
      # --------------------------------
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # --------------------------------
      # 3. Restore
      # --------------------------------
      - name: Restore
        run: dotnet restore App/App.csproj

      # --------------------------------
      # 4. Build
      # --------------------------------
      - name: Build
        run: dotnet build App/App.csproj --no-restore

      # --------------------------------
      # 5. Collect ONLY CHANGED FILES (SMART QA)
      # --------------------------------
      - name: Collect Git Diff Context
        run: |
          echo "=== CHANGED FILES ===" > context.txt
          git diff --name-only HEAD~1 HEAD >> context.txt

          echo "=== CODE DIFF ===" >> context.txt
          git diff HEAD~1 HEAD >> context.txt

      # --------------------------------
      # 6. SMART HERMES QA (FIXED TOKEN USAGE)
      # --------------------------------
      - name: Hermes Smart QA
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          CONTEXT=$(cat context.txt | head -c 4000)

          RESPONSE=$(curl -s https://openrouter.ai/api/v1/chat/completions \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"google/gemini-3.1-flash-lite-preview\",
              \"messages\": [
                {
                  \"role\": \"system\",
                  \"content\": \"You are Hermes QA agent. You analyze ONLY code changes (diff-based). Be strict but concise.\"
                },
                {
                  \"role\": \"user\",
                  \"content\": \"Analyze this git diff. Check for build risk, breaking changes, missing dependencies, and unsafe code changes. Return ONLY JSON: {\\\"status\\\":\\\"PASS or FAIL\\\",\\\"reason\\\":\\\"\\\"}. Diff: $CONTEXT\"
                }
              ]
            }")

          echo "$RESPONSE"

          STATUS=$(echo "$RESPONSE" | grep -o '"status":"[^"]*"' | cut -d':' -f2 | tr -d '"')

          if [[ "$STATUS" != "PASS" ]]; then
            echo "❌ QA FAILED"
            exit 1
          fi

          echo "✅ QA PASSED"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: success()

    steps:
      # --------------------------------
      # 7. Deploy to WSL / Server
      # --------------------------------
      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "🚀 Deploy starting..."

            cd ~/my-cicd-project

            git pull origin main

            dotnet build App/App.csproj -c Release

            echo "===================="
            echo "DEPLOY SUCCESS 🚀"
            echo "===================="
