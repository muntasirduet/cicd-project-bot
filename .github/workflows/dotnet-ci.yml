name: CI + Smart Hermes QA + Auto Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-qa:
    runs-on: ubuntu-latest

    steps:
      # --------------------------------
      # 1. Checkout (IMPORTANT for git diff)
      # --------------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # --------------------------------
      # 2. Setup .NET
      # --------------------------------
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # --------------------------------
      # 3. Restore
      # --------------------------------
      - name: Restore
        run: dotnet restore App/App.csproj

      # --------------------------------
      # 4. Build
      # --------------------------------
      - name: Build
        run: dotnet build App/App.csproj --no-restore

      # --------------------------------
      # 5. Collect Git Diff (SMART QA INPUT)
      # --------------------------------
      - name: Collect Git Diff Context
        run: |
          echo "===== CHANGED FILES =====" > context.txt
          git diff --name-only HEAD~1 HEAD >> context.txt

          echo "===== CODE DIFF =====" >> context.txt
          git diff HEAD~1 HEAD >> context.txt

      # --------------------------------
      # 6. Install jq (FIX JSON ISSUES)
      # --------------------------------
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # --------------------------------
      # 7. HERMES SMART QA (FIXED + SAFE)
      # --------------------------------
      - name: Hermes Smart QA
        id: qa
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          CONTEXT=$(cat context.txt | head -c 4000)

          # SAFE JSON ESCAPING
          SAFE_CONTEXT=$(echo "$CONTEXT" | jq -Rs .)

          RESPONSE=$(curl -s https://openrouter.ai/api/v1/chat/completions \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"google/gemini-3.1-flash-lite-preview\",
              \"messages\": [
                {
                  \"role\": \"system\",
                  \"content\": \"You are Hermes QA agent. You analyze code diffs for build safety and risks.\"
                },
                {
                  \"role\": \"user\",
                  \"content\": \"Analyze this git diff. Check for build issues, missing dependencies, breaking changes, and security risks. Return ONLY JSON: {\\\"status\\\":\\\"PASS or FAIL\\\",\\\"reason\\\":\\\"\\\"}. Diff: $SAFE_CONTEXT\"
                }
              ]
            }")

          echo "$RESPONSE"

          STATUS=$(echo "$RESPONSE" | grep -o '"status":"[^"]*"' | cut -d':' -f2 | tr -d '"')

          echo "QA_STATUS=$STATUS" >> $GITHUB_ENV
          echo "✅ QA PASSED"

  deploy:
    needs: build-and-qa
    runs-on: ubuntu-latest
    if: success()

    steps:
      # --------------------------------
      # 8. Deploy to WSL / Server
      # --------------------------------
      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "🚀 Starting Deployment..."

            cd ~/my-cicd-project

            git pull origin main

            dotnet build App/App.csproj -c Release

            echo "===================="
            echo "DEPLOY SUCCESS 🚀"
            echo "===================="
