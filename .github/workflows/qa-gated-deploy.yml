name: QA-Gated Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      skip_qa:
        description: 'Skip QA tests (dangerous!)'
        required: false
        default: false
        type: boolean

jobs:
  qa-test:
    name: 🔍 Run QA Tests
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_qa }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build project
        run: dotnet build App/App.csproj --configuration Release

      - name: Start API in background
        run: |
          dotnet run --project App/App.csproj --urls "http://localhost:5000" &
          sleep 5

      - name: Run QA Tests
        run: |
          python3 qa-deploy.py

      - name: Upload QA Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-report
          path: qa-report.md

      - name: Comment QA Result on PR/Commit
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('qa-report.md', 'utf8');
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: report
            });

  approval:
    name: ⏸️ Wait for Approval
    needs: qa-test
    runs-on: ubuntu-latest
    if: ${{ always() && needs.qa-test.result == 'success' }}
    environment:
      name: ${{ inputs.environment }}
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Approval checkpoint
        run: echo "Approved by ${{ github.actor }} — proceeding to deploy"

  deploy:
    name: 🚀 Deploy
    needs: approval
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: dotnet publish App/App.csproj -c Release -o ./publish

      - name: Deploy to Server (example via SSH)
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          echo "🚀 Deploying to ${{ inputs.environment }}..."
          # Example: rsync -avz ./publish/ $SERVER_USER@$SERVER_HOST:/var/www/my-api/
          # Example: ssh $SERVER_USER@$SERVER_HOST 'sudo systemctl restart my-api'
          echo "Replace this with your actual deploy commands"

      - name: Post-deploy Health Check
        run: |
          sleep 3
          curl -sf ${{ secrets.PROD_URL }}/health || exit 1
